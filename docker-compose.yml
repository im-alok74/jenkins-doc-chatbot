version: '3.8'
services:
  fastapi-backend:
    build:
      context: ./jenkins-chatbot-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./jenkins-chatbot-backend/data/faiss_index:/app/data/faiss_index
    env_file:
      - ./jenkins-chatbot-backend/.env.example
    restart: unless-stopped
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
volumes:
  ollama_data:
